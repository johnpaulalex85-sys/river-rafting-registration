{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] py-10">
  <div class="relative max-w-md w-full bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl p-8 text-center border border-white/50 overflow-hidden">
    <!-- Background element -->
    <div class="absolute inset-0 z-[-1] bg-gradient-to-br from-red-50 to-orange-50 opacity-100"></div>
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-red-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    
    <!-- Failure Icon -->
    <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-red-400 to-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-red-400/40 mb-6">
      <i class="bi bi-x-lg text-white text-5xl drop-shadow-md"></i>
    </div>
    
    <h2 class="text-3xl font-extrabold text-gray-800 mb-3 tracking-tight">Payment Failed</h2>
    <p class="text-gray-600 mb-8 font-medium leading-relaxed">We couldn't process your payment. Your booking has not been confirmed yet.</p>
    
    <!-- Action Buttons -->
    <div class="flex flex-col space-y-3">
      <a href="{{ url_for('booking.home') }}" class="relative inline-flex flex-col items-center justify-center w-full py-3.5 px-4 bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 text-white rounded-xl font-semibold transition-all duration-300 shadow-md shadow-red-500/30 tracking-wide hover:-translate-y-0.5 overflow-hidden group">
        <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
        <div class="flex items-center gap-2">
          <i class="bi bi-arrow-counterclockwise text-xl"></i>
          <span>Try Again</span>
        </div>
      </a>
    </div>
  </div>
</div>

<style>
  @keyframes blob {
    0% { transform: translate(0px, 0px) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0px, 0px) scale(1); }
  }
  .animate-blob {
    animation: blob 7s infinite;
  }
  .animation-delay-2000 {
    animation-delay: 2s;
  }
</style>
{% endblock %}
